{% extends 'base.html' %}

{% block title %}Excluir Etapa — Oficina System{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white/5 border border-red-500/20 rounded-2xl overflow-hidden p-6 text-center">
    <div class="w-16 h-16 bg-red-500/20 text-red-400 border border-red-500/30 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h2 class="text-xl font-bold text-gray-100 mb-2">Excluir Etapa Padrão?</h2>
    <p class="text-gray-400 text-sm mb-6">
      Tem certeza que deseja excluir a etapa <strong>"{{ etapa.nome }}"</strong>? Esta ação não pode ser desfeita se a etapa não estiver em uso.
    </p>

    <div class="flex gap-3 justify-center">
      <a href="{% url 'orcamentos:etapa_list' %}" class="px-5 py-2.5 text-gray-400 hover:text-gray-200 bg-white/5 hover:bg-white/10 rounded-xl transition text-sm font-medium">Cancelar</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-2.5 rounded-xl transition shadow-lg shadow-red-500/20 text-sm">
          Sim, Excluir
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
