{% extends 'base.html' %}

{% block title %}Excluir Peça{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8 text-center">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-3xl text-red-600 animate-pulse"></i>
            </div>
            
            <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Confirmar Exclusão</h1>
            <p class="text-gray-500 mb-8">
                Você está prestes a remover a peça <span class="font-bold text-gray-900">"{{ peca.descricao }}"</span>. 
                Esta ação não poderá ser desfeita.
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <a href="{% url 'pecas:list' %}" class="w-full sm:w-auto px-8 py-3 text-sm font-bold text-gray-600 hover:text-gray-800 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-all">
                        Cancelar
                    </a>
                    <button type="submit" class="w-full sm:w-auto px-8 py-3 text-sm font-bold text-white bg-red-600 rounded-xl hover:bg-red-700 focus:ring-4 focus:ring-red-200 transition-all shadow-lg shadow-red-100">
                        Sim, Excluir Peça
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
