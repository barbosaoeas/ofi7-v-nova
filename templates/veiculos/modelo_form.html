{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex justify-end space-x-4 mt-6">
            <a href="{% url 'veiculos:modelo_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-gray-600 text-white rounded-lg">Salvar</button>
        </div>
    </form>
</div>
{% endblock %}
