{% extends 'base.html' %}
{% block title %}Excluir Veículo{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8 text-center">
    <i class="fas fa-exclamation-triangle text-red-500 text-6xl mb-4"></i>
    <h1 class="text-2xl font-bold mb-4">Confirmar Exclusão</h1>
    <p class="mb-6">Tem certeza que deseja excluir o veículo <strong>{{ veiculo.placa }}</strong>?</p>
    <form method="post" class="flex justify-center space-x-4">
        {% csrf_token %}
        <a href="{% url 'veiculos:list' %}" class="px-6 py-3 border border-gray-300 rounded-lg">Cancelar</a>
        <button type="submit" class="px-6 py-3 bg-red-500 text-white rounded-lg">Sim, Excluir</button>
    </form>
</div>
{% endblock %}
